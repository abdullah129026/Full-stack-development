<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO Meta Tags -->
  <title>SkyPulse — Real-Time Weather App</title>
  <meta name="description"
    content="SkyPulse gives you real-time weather conditions, temperature, humidity, wind speed, UV index, and more for any city in the world. Switch between Celsius and Fahrenheit instantly." />
  <meta name="keywords" content="weather app, real-time weather, forecast, temperature, humidity, wind speed" />
  <meta name="author" content="SkyPulse" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="SkyPulse — Real-Time Weather App" />
  <meta property="og:description"
    content="Check real-time weather for any city in the world. Beautiful, fast, and accurate." />

  <!-- Favicon (emoji fallback) -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤️</text></svg>" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay" role="status" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <p class="loading-text">Fetching weather data…</p>
  </div>

  <!-- Error Toast -->
  <div id="error-toast" class="error-toast" role="alert" aria-live="assertive">
    <span class="error-icon" aria-hidden="true">⚠️</span>
    <p id="error-message" class="error-message">Something went wrong.</p>
    <button id="error-close" class="error-close" aria-label="Dismiss error">✕</button>
  </div>

  <!-- App Wrapper -->
  <div class="app-wrapper">

    <!-- Header -->
    <header>
      <div class="app-logo" aria-hidden="true">🌤️</div>
      <h1 class="app-title">SkyPulse</h1>
      <p class="app-subtitle">Real-time weather, beautifully delivered</p>
    </header>

    <!-- Search Section -->
    <section class="search-section" aria-label="Location search">

      <form id="search-form" class="search-form" role="search" autocomplete="off">
        <label for="search-input" class="visually-hidden">Search for a city</label>
        <input
          id="search-input"
          type="text"
          class="search-input"
          placeholder="Search city, region, or country…"
          aria-label="Enter a location to get weather"
          spellcheck="false"
        />
        <button id="search-btn" type="submit" class="search-btn">
          <span aria-hidden="true">🔍</span>
          <span>Search</span>
        </button>
      </form>

      <!-- Unit Toggle -->
      <div class="unit-toggle" role="group" aria-label="Temperature unit">
        <span class="unit-toggle-label">Unit:</span>
        <div class="toggle-group">
          <button id="btn-celsius" class="toggle-btn active" aria-pressed="true" title="Switch to Celsius">°C</button>
          <button id="btn-fahrenheit" class="toggle-btn" aria-pressed="false" title="Switch to Fahrenheit">°F</button>
        </div>
      </div>

    </section>

    <!-- Weather Card -->
    <main>
      <article id="weather-card" class="weather-card" aria-label="Weather information" aria-live="polite">

        <!-- Card Header: Location & Time -->
        <div class="card-header">
          <div class="location-info">
            <h2 class="location-name">
              <span class="pin-icon" aria-hidden="true">📍</span>
              <span id="location-name">—</span>
            </h2>
            <p id="observation-time" class="observation-time">—</p>
          </div>
        </div>

        <!-- Main Temperature Display -->
        <div class="temp-display" aria-label="Current temperature and condition">
          <div id="condition-emoji" class="condition-emoji" aria-hidden="true">🌡️</div>
          <div class="temp-info">
            <div class="temperature-row">
              <span id="temperature" class="temperature">—</span>
              <span id="unit-label" class="unit-label">°C</span>
            </div>
            <p id="condition-text" class="condition-text">—</p>
            <p class="feels-like">Feels like <strong id="feels-like">—</strong></p>
          </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid" role="list" aria-label="Weather statistics">

          <div class="stat-card" role="listitem">
            <div class="stat-icon" aria-hidden="true">💧</div>
            <div class="stat-label">Humidity</div>
            <div id="humidity" class="stat-value">—</div>
          </div>

          <div class="stat-card" role="listitem">
            <div class="stat-icon" aria-hidden="true">💨</div>
            <div class="stat-label">Wind Speed</div>
            <div class="stat-value">
              <span id="wind-speed">—</span>
              <span id="wind-unit" class="stat-sub"> km/h</span>
            </div>
          </div>

          <div class="stat-card" role="listitem">
            <div class="stat-icon" aria-hidden="true">☀️</div>
            <div class="stat-label">UV Index</div>
            <div id="uv-index" class="stat-value">—</div>
            <div id="uv-label" class="stat-sub">—</div>
          </div>

          <div class="stat-card" role="listitem">
            <div class="stat-icon" aria-hidden="true">👁️</div>
            <div class="stat-label">Visibility</div>
            <div id="visibility" class="stat-value">—</div>
          </div>

          <div class="stat-card" role="listitem">
            <div class="stat-icon" aria-hidden="true">🌡️</div>
            <div class="stat-label">Dew Point</div>
            <div id="dew-point" class="stat-value">—</div>
          </div>

        </div>

        <!-- Sunrise / Sunset -->
        <div class="sun-info" aria-label="Sunrise and sunset times">
          <div class="sun-item">
            <span class="sun-icon" aria-hidden="true">🌅</span>
            <div>
              <div class="sun-label">Sunrise</div>
              <div id="sunrise" class="sun-time">—</div>
            </div>
          </div>
          <div class="sun-item">
            <span class="sun-icon" aria-hidden="true">🌇</span>
            <div>
              <div class="sun-label">Sunset</div>
              <div id="sunset" class="sun-time">—</div>
            </div>
          </div>
        </div>

      </article>
    </main>

  </div><!-- /app-wrapper -->

  <!-- Footer -->
  <footer>
    <p>Powered by <a href="https://www.visualcrossing.com/" target="_blank" rel="noopener noreferrer">Visual Crossing Weather API</a></p>
  </footer>

  <!-- Visually hidden utility class (for screen readers) -->
  <style>
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>

  <!-- ES Module entry point -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
