<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <!-- Use Inter font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Defer script execution to ensure DOM is fully loaded -->
    <script src="script.js" defer></script>
</head>

<body>
    <header>
        <h1>My Library</h1>
        <button id="new-book-btn" class="btn">Add New Book</button>
    </header>

    <main>
        <div id="library-container">
            <!-- Book cards will be injected here dynamically -->
        </div>
    </main>

    <!-- Dialog Modal for New Book Form -->
    <dialog id="book-dialog">
        <h2>Add a New Book</h2>
        <form id="book-form">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required>
            </div>
            
            <div class="form-group">
                <label for="author">Author</label>
                <input type="text" id="author" name="author" required>
            </div>
            
            <div class="form-group">
                <label for="pages">Number of Pages</label>
                <input type="number" id="pages" name="pages" min="1" required>
            </div>
            
            <div class="form-group">
                <label>
                    <input type="checkbox" id="isRead" name="isRead">
                    I have read this book
                </label>
            </div>
            
            <div class="form-actions">
                <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
                <button type="submit" class="btn">Add Book</button>
            </div>
        </form>
    </dialog>
</body>

</html>
